<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC2 Instance Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>EC2 Instance Manager</h1>
        <button id="fetchBtn" onclick="fetchInstances()">Fetch Instances</button>
        <div id="message" class="message"></div>
        <table id="instanceTable" style="display:none;">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Instance ID</th>
                    <th>Type</th>
                    <th>State</th>
                    <th>Public IP</th>
                    <th>Private IP</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="instanceBody"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
